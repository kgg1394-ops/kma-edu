<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMA 연수교육 일정 대시보드</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #1a68b2; --bg-gray: #f4f7f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: var(--main-blue); border-left: 5px solid var(--main-blue); padding-left: 15px; margin-bottom: 25px; }
        .info-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9em; color: #666; }
        table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th { background: var(--main-blue); color: white; padding: 15px; text-align: left; font-weight: 500; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95em; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9fbff; transition: 0.2s; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .online { background: #e3f2fd; color: #1976d2; }
        .credits { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fa-solid fa-user-md"></i> 의협 연수교육 일정 자동 알림</h2>
        <div class="info-bar">
            <span><i class="fa-solid fa-clock"></i> 업데이트: 2026-03-03</span>
            <span>추출된 교육: <strong id="count">0</strong>건</span>
        </div>
        <table id="edu-table">
            <thead>
                <tr>
                    <th>교육명</th>
                    <th>평점</th>
                    <th>날짜</th>
                    <th>기관 및 장소</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const tbody = document.querySelector('#edu-table tbody');
                document.getElementById('count').innerText = data.length;
                data.forEach(item => {
                    const isOnline = item.title.includes('온라인') || item.location.includes('온라인');
                    const row = `<tr>
                        <td><strong>${item.title}</strong> ${isOnline ? '<span class="badge online">온라인</span>' : ''}</td>
                        <td class="credits">${item.credits}점</td>
                        <td>${item.date}</td>
                        <td><small>${item.institution}</small><br><i class="fa-solid fa-location-dot" style="font-size:0.8em"></i> ${item.location}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
    </script>
</body>
</html>
