<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED Essential Edu-Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { --med-blue: #0277bd; --bg-light: #f4f7f9; --white: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-light); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--med-blue); }
        h1 { margin: 0; color: var(--med-blue); font-size: 1.6rem; display: flex; align-items: center; gap: 10px; }
        .edu-item { background: var(--white); padding: 20px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .edu-item:hover { transform: scale(1.01); box-shadow: 0 6px 15px rgba(0,0,0,0.06); }
        .online-badge { background: #e8f5e9; color: #2e7d32; font-size: 0.75rem; padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-left: 8px; }
        .d-day { font-weight: 800; color: #d32f2f; font-size: 1.2rem; }
        .btn-reg { padding: 10px 20px; background: var(--med-blue); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; }
        .page-btn { padding: 10px 18px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <h1><i class="fa-solid fa-calendar-check"></i> 필수평점 교육 일정</h1>
        <p style="color:#666; margin-top:8px; font-size:0.95rem;">2026년 면허 유지를 위한 필수 교육 리스트입니다.</p>
    </header>

    <div id="edu-list"></div>

    <div class="pagination">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">이전</button>
        <span id="page-info" style="font-weight:bold;">1 / 1</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">다음</button>
    </div>
</div>

<script>
    let allData = [];
    let currentPage = 1;
    const itemsPerPage = 15;

    fetch('data.json').then(res => res.json()).then(data => {
        allData = data;
        updateDisplay();
    });

    function updateDisplay() {
        const list = document.getElementById('edu-list');
        list.innerHTML = '';

        const start = (currentPage - 1) * itemsPerPage;
        const pageData = allData.slice(start, start + itemsPerPage);

        pageData.forEach(item => {
            const eduDate = new Date(item.date.split('~')[0].trim());
            const diffDays = Math.ceil((eduDate - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24));
            const dDayText = diffDays === 0 ? "Today" : (diffDays > 0 ? `D-${diffDays}` : "종료");

            list.innerHTML += `
                <div class="edu-item">
                    <div style="flex:1;">
                        <div style="font-weight:bold; font-size:1.1rem; margin-bottom:8px;">
                            ${item.title} ${item.is_online ? '<span class="online-badge">온라인</span>' : ''}
                        </div>
                        <div style="font-size:0.85rem; color:#777;">
                            <i class="fa-solid fa-building"></i> ${item.institution} | 
                            <i class="fa-solid fa-location-dot"></i> ${item.location}
                        </div>
                        <div style="font-size:0.85rem; color:#777; margin-top:4px;">
                            <i class="fa-regular fa-clock"></i> ${item.date}
                        </div>
                    </div>
                    <div style="text-align:right; min-width:110px;">
                        <div class="d-day">${dDayText}</div>
                        <div style="margin-top:10px;">
                            <a href="${item.reg_url}" target="_blank" class="btn-reg">신청하기</a>
                        </div>
                    </div>
                </div>
            `;
        });

        const totalPages = Math.ceil(allData.length / itemsPerPage) || 1;
        document.getElementById('page-info').innerText = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    function changePage(dir) { currentPage += dir; updateDisplay(); window.scrollTo(0, 0); }
</script>
</body>
</html>
