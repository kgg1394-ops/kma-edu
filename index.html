<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM Specialist Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #0d47a1; --med-gold: #ffb300; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--main-blue); padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: var(--main-blue); margin: 0; font-size: 1.5rem; }
        .search-box { padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 5px; }
        .filter-btn { padding: 10px 15px; background: var(--main-blue); color: white; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #e3f2fd; color: #333; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .im-highlight { background-color: #fff9c4 !important; font-weight: bold; border-left: 4px solid var(--med-gold); }
        .badge-online { background: #e8f5e9; color: #2e7d32; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-stethoscope"></i> 내과 전문의 연수교육 대시보드</h1>
            <div>
                <input type="text" id="searchInput" class="search-box" placeholder="교육명, 기관 검색...">
                <button onclick="filterInternalMedicine()" class="filter-btn">내과 교육만 보기</button>
            </div>
        </div>
        
        <table id="eduTable">
            <thead>
                <tr>
                    <th>교육명</th>
                    <th>평점</th>
                    <th>날짜</th>
                    <th>기관 및 장소</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let allData = [];

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                displayData(data);
            });

        function displayData(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(item => {
                const isIM = item.title.includes('내과') || item.institution.includes('내과');
                const row = `<tr class="${isIM ? 'im-highlight' : ''}">
                    <td>${item.title} ${item.is_online ? '<span class="badge-online">온라인</span>' : ''}</td>
                    <td style="color:#d32f2f; font-weight:bold;">${item.credits}점</td>
                    <td>${item.date}</td>
                    <td><small>${item.institution}</small><br>${item.location}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // 실시간 검색 기능
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(item => 
                item.title.toLowerCase().includes(term) || item.institution.toLowerCase().includes(term)
            );
            displayData(filtered);
        });

        // 내과 필터 기능
        function filterInternalMedicine() {
            const filtered = allData.filter(item => item.title.includes('내과') || item.institution.includes('내과'));
            displayData(filtered);
        }
    </script>
</body>
</html>
