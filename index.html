<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GI Edu-Tracker (Paginated)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gi-blue: #0277bd; --gi-accent: #ff7043; --bg-light: #f4f7f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-light); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header { border-bottom: 3px solid var(--gi-blue); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: var(--gi-blue); font-size: 1.4rem; }
        
        /* 검색창 */
        .search-area { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* 카드 스타일 리스트 */
        .edu-item { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .edu-item:hover { border-color: var(--gi-blue); background: #fcfdfe; }
        .gi-highlight { border-left: 5px solid var(--gi-accent); background: #fff9f7; }

        /* 페이징 컨트롤 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .page-btn { padding: 8px 16px; border: 1px solid var(--gi-blue); background: white; color: var(--gi-blue); border-radius: 5px; cursor: pointer; font-weight: bold; }
        .page-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }
        .page-btn:hover:not(:disabled) { background: var(--gi-blue); color: white; }
        #page-info { font-weight: bold; color: #555; }

        .score-badge { background: var(--gi-blue); color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa- stethoscope"></i> 연수교육 일정 (15개씩 보기)</h1>
            <span id="total-stat" style="font-size: 0.9rem; color: #666;"></span>
        </div>

        <div class="search-area">
            <input type="text" id="searchInput" class="search-input" placeholder="교육명 또는 기관 검색...">
        </div>

        <div id="edu-list">
            </div>

        <div class="pagination">
            <button id="prevBtn" class="page-btn" onclick="changePage(-1)">이전</button>
            <span id="page-info">1 / 1</span>
            <button id="nextBtn" class="page-btn" onclick="changePage(1)">다음</button>
        </div>
    </div>

    <script>
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const itemsPerPage = 15;
        const giKeywords = ['내과', '췌장', '담도', '간', '내시경', 'ERCP', '소화기'];

        // 데이터 로드
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                filteredData = [...allData]; // 초기값은 전체 데이터
                updateDisplay();
            });

        function updateDisplay() {
            const list = document.getElementById('edu-list');
            list.innerHTML = '';

            // 페이징 계산
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);

            // 데이터 렌더링
            pageData.forEach(item => {
                const isGI = giKeywords.some(key => item.title.includes(key));
                const itemHtml = `
                    <div class="edu-item ${isGI ? 'gi-highlight' : ''}">
                        <div>
                            <div style="font-weight:bold; margin-bottom:5px;">${isGI ? '🔥 ' : ''}${item.title}</div>
                            <div style="font-size:0.85rem; color:#777;">
                                <i class="fa-regular fa-calendar"></i> ${item.date} | 
                                <i class="fa-solid fa-location-dot"></i> ${item.location}
                            </div>
                        </div>
                        <div class="score-badge">${item.credits}점</div>
                    </div>
                `;
                list.innerHTML += itemHtml;
            });

            // UI 업데이트
            const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
            document.getElementById('page-info').innerText = `${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            document.getElementById('total-stat').innerText = `총 ${filteredData.length}건 검색됨`;
        }

        function changePage(direction) {
            currentPage += direction;
            updateDisplay();
            window.scrollTo(0, 0); // 페이지 이동 시 상단으로 스크롤
        }

        // 검색 기능
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredData = allData.filter(item => 
                item.title.toLowerCase().includes(term) || 
                item.institution.toLowerCase().includes(term)
            );
            currentPage = 1; // 검색 시 1페이지로 리셋
            updateDisplay();
        });
    </script>
</body>
</html>
