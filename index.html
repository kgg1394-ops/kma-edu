<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED Essential Edu-Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { --med-blue: #0277bd; --med-accent: #ff7043; --bg-light: #f4f7f9; --white: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-light); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--med-blue); }
        h1 { margin: 0; color: var(--med-blue); font-size: 1.8rem; display: flex; align-items: center; gap: 12px; }
        .edu-item { background: var(--white); padding: 25px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .credits-tag { font-size: 1.2rem; font-weight: 800; color: #d32f2f; margin-bottom: 10px; }
        .btn-reg { display: inline-block; padding: 10px 20px; background: var(--med-blue); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 25px; margin-top: 40px; }
        .page-btn { background: var(--white); border: 1px solid #ddd; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .page-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1><i class="fa-solid fa-user-doctor"></i> 2026 연수교육 필수평점 관리</h1>
        <p style="color:#666; margin-top:10px;">면허 유지를 위한 올해의 필수 평점 교육 일정을 안내합니다.</p>
    </header>

    <div id="edu-list"></div>

    <div class="pagination">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">이전</button>
        <span id="page-info">1 / 1</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">다음</button>
    </div>
</div>

<script>
    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    const itemsPerPage = 15;

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            allData = data;
            filteredData = [...allData];
            updateDisplay();
        });

    function updateDisplay() {
        const list = document.getElementById('edu-list');
        list.innerHTML = '';

        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageData = filteredData.slice(start, end);

        if (pageData.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">검색 결과가 없습니다.</div>';
        }

        pageData.forEach(item => {
            list.innerHTML += `
                <div class="edu-item">
                    <div>
                        <h3 style="margin:0 0 10px 0;">${item.title}</h3>
                        <div style="font-size:0.9rem; color:#666;">
                            <span><i class="fa-regular fa-building"></i> ${item.institution}</span> | 
                            <span><i class="fa-regular fa-calendar-check"></i> ${item.date}</span>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div class="credits-tag">${item.credits}점 (필수)</div>
                        <a href="${item.reg_url}" target="_blank" class="btn-reg">신청하기 <i class="fa-solid fa-chevron-right"></i></a>
                    </div>
                </div>
            `;
        });

        const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
        document.getElementById('page-info').innerText = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    function changePage(direction) {
        currentPage += direction;
        updateDisplay();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
